<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D 격투 액션 게임 - 배경 자동 제거 및 크기 보정 버전</title>
    <style>
        body {
            margin: 0;
            background-color: #1a1a1a;
            color: #fff;
            font-family: 'Malgun Gothic', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        #game-container {
            position: relative;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }
        canvas {
            background: #2c3e50;
            display: block;
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas" width="1024" height="640"></canvas>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// --- 게임 상태 관리 ---
const STATES = { SELECT: 0, PLAYING: 1, ROUND_END: 2, GAME_OVER: 3 };
let gameState = STATES.SELECT;

// 이미지 및 픽셀 처리를 위한 캐시 생성
const images = {};
const processedImages = {}; // 배경이 제거된 이미지가 임시 저장될 공간
const imgFiles = {
    '1-1': '1-1.png',
    '2-1': '2-1.png',
    '3-1': '3-1.png',
    '4-1': '4-1.png'
};

let loadedImages = 0;
const totalImages = Object.keys(imgFiles).length;

// 실시간 크로마키/배경 격자 제거 함수
function processTransparentBackground(imgKey, imgElement) {
    const tempCanvas = document.createElement('canvas');
    const tempCtx = tempCanvas.getContext('2d');
    tempCanvas.width = imgElement.width;
    tempCanvas.height = imgElement.height;
    
    tempCtx.drawImage(imgElement, 0, 0);
    
    try {
        const imgData = tempCtx.getImageData(0, 0, tempCanvas.width, tempCanvas.height);
        const data = imgData.data;
        
        // 이미지의 특정 회색/보라색 격자 픽셀 패턴을 분석하여 강제 투명화(Alpha = 0)
        for (let i = 0; i < data.length; i += 4) {
            let r = data[i];
            let g = data[i+1];
            let b = data[i+2];
            
            // 1. AI 생성 시트 특유의 회색 바둑판무늬 제거 조건
            const isGrayGrid1 = (r === 153 && g === 153 && b === 153);
            const isGrayGrid2 = (r === 102 && g === 102 && b === 102);
            const isGrayGrid3 = (Math.abs(r - g) < 5 && Math.abs(g - b) < 5 && r > 100 && r < 210); // 유동적 회색조 제거
            
            // 2. 보라색 바둑판무늬 제거 조건
            const isPurpleGrid = (r > 120 && r < 200 && b > 150 && b < 240 && g < 100);

            if (isGrayGrid1 || isGrayGrid2 || isGrayGrid3 || isPurpleGrid) {
                data[i + 3] = 0; // 투명도 0으로 제작
            }
        }
        tempCtx.putImageData(imgData, 0, 0);
        
        // 가공된 새로운 이미지 오브젝트 저장
        const newImg = new Image();
        newImg.src = tempCanvas.toDataURL();
        processedImages[imgKey] = newImg;
    } catch (e) {
        console.error("크로마키 처리 실패 (로컬 보안 정책 원인일 수 있음):", e);
        processedImages[imgKey] = imgElement; // 실패시 원본 복구
    }
}

Object.entries(imgFiles).forEach(([key, src]) => {
    images[key] = new Image();
    images[key].src = src;
    images[key].onload = () => {
        processTransparentBackground(key, images[key]);
        loadedImages++;
    };
    images[key].onerror = () => {
        console.warn(`${src} 파일 로드 실패. 사각형으로 대체합니다.`);
    };
});

// 캐릭터별 맞춤형 프레임 간격 및 규격 데이터 보정
const characterMetaData = {
    1: { asset: '1-1', idle: 0, walk: 1, run: 2, attack: 3, skill1: 4, skill2: 5, ult: 6, block: 7, size: 256, maxFrames: [8,8,8,8,8,8,8,8], offsetY: -40 },
    2: { asset: '2-1', idle: 0, walk: 1, run: 2, skill1: 3, ult: 4, attack: 5, skill2: 6, block: 7, size: 256, maxFrames: [8,8,8,8,8,8,8,8], offsetY: -40 },
    3: { asset: '3-1', idle: 0, walk: 1, run: 2, attack: 3, skill1: 4, skill2: 5, ult: 7, block: 8, size: 245, maxFrames: [8,8,6,6,6,6,6,6,6], offsetY: -20 }, // AI 그리드 오차 보정 오프셋
    4: { asset: '4-1', idle: 0, walk: 1, run: 2, skill1: 3, ult: 4, attack: 5, skill2: 6, block: 7, size: 256, maxFrames: [8,8,7,5,5,7,7,7], offsetY: -40 }
};

let p1Selected = null, p2Selected = null;
let p1Wins = 0, p2Wins = 0, currentRound = 1;
let winnerText = "";
let flashDuration = 0, flashColor = "#ffffff";
let projectiles = [], particles = [];
const keys = {};

window.addEventListener('keydown', e => { keys[e.key] = true; handleKeyDown(e.key); });
window.addEventListener('keyup', e => { keys[e.key] = false; });

class Player {
    constructor(id, x, y, charId, isFlip) {
        this.id = id;
        this.x = x;
        this.y = y;
        this.charId = charId;
        this.meta = characterMetaData[charId];
        this.width = 110; 
        this.height = 170;
        this.speed = 5;
        this.runSpeed = 8;
        this.isFlip = isFlip;

        this.maxHp = 100; this.hp = 100;
        this.maxMp = 100; this.mp = 0;

        this.currentAction = 'idle';
        this.frameIdx = 0;
        this.frameTimer = 0;
        this.frameSpeed = 7; 

        this.isLock = false;
        this.hitbox = { x: 0, y: 0, w: 0, h: 0, active: false };
    }

    update() {
        if (this.hp > 0 && this.mp < this.maxMp) {
            this.mp = Math.min(this.maxMp, this.mp + 0.2); 
        }

        this.frameTimer++;
        const row = this.meta[this.currentAction];
        const maxFrame = this.meta.maxFrames[row] || 8;

        if (this.frameTimer >= this.frameSpeed) {
            this.frameTimer = 0;
            this.frameIdx++;
            if (this.frameIdx >= maxFrame) {
                if (this.isLock) {
                    this.isLock = false;
                    this.currentAction = 'idle';
                }
                this.frameIdx = 0;
            }
        }

        if (this.hitbox.active && this.currentAction === 'attack') {
            this.hitbox.w = 90; this.hitbox.h = 60;
            this.hitbox.y = this.y + 40;
            this.hitbox.x = this.isFlip ? this.x - this.hitbox.w : this.x + this.width;
            if (this.frameIdx === 3 || this.frameIdx === 4) {
                checkHit(this, this.id === 1 ? p2 : p1, 6, false);
            }
        } else {
            this.hitbox.active = false;
        }
    }

    changeAction(action, isLock = false) {
        if (this.currentAction === action) return;
        if (this.isLock && !isLock) return;
        this.currentAction = action;
        this.frameIdx = 0;
        this.frameTimer = 0;
        this.isLock = isLock;
    }

    takeDamage(amount) {
        if (this.currentAction === 'block') {
            this.hp -= amount * 0.15; // 85% 방어
            this.mp = Math.min(this.maxMp, this.mp + amount * 1.5);
            createParticles(this.x + this.width/2, this.y + this.height/2, '#3498db', 8);
        } else {
            this.hp -= amount;
            this.mp = Math.min(this.maxMp, this.mp + amount * 0.5);
            createParticles(this.x + this.width/2, this.y + this.height/2, '#e74c3c', 12);
        }
        if (this.hp < 0) this.hp = 0;
    }

    draw() {
        ctx.save();
        let drawX = this.x;
        if (this.isFlip) {
            ctx.scale(-1, 1);
            drawX = -this.x - this.width;
        }

        const row = this.meta[this.currentAction];
        const processedImg = processedImages[this.meta.asset];
        const size = this.meta.size;

        if (processedImg) {
            // 보정된 간격 크기(size) 기반 매핑 렌더링
            ctx.drawImage(
                processedImg,
                this.frameIdx * size, row * size, size, size,
                drawX - 70, this.y + this.meta.offsetY, this.width + 140, this.height + 60
            );
        } else {
            ctx.fillStyle = this.id === 1 ? '#3498db' : '#e74c3c';
            ctx.fillRect(drawX, this.y, this.width, this.height);
        }
        ctx.restore();

        // HP/MP 게이지 바
        const barW = this.width;
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(this.x, this.y - 25, barW, 6);
        ctx.fillRect(this.x, this.y - 15, barW, 4);
        ctx.fillStyle = '#2ecc71';
        ctx.fillRect(this.x, this.y - 25, barW * (this.hp / this.maxHp), 6);
        ctx.fillStyle = '#f1c40f';
        ctx.fillRect(this.x, this.y - 15, barW * (this.mp / this.maxMp), 4);
    }
}

let p1, p2;

class Projectile {
    constructor(x, y, vx, owner, color) {
        this.x = x; this.y = y; this.vx = vx; this.owner = owner; this.color = color;
        this.radius = 15; this.active = true;
    }
    update() {
        this.x += this.vx;
        const target = this.owner.id === 1 ? p2 : p1;
        if (this.x > target.x && this.x < target.x + target.width &&
            this.y > target.y && this.y < target.y + target.height) {
            target.takeDamage(12);
            this.active = false;
        }
        if (this.x < 0 || this.x > canvas.width) this.active = false;
    }
    draw() {
        ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = this.color; ctx.fill();
    }
}

function createParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
        particles.push({
            x: x, y: y,
            vx: (Math.random() - 0.5) * 6, vy: (Math.random() - 0.5) * 6,
            radius: Math.random() * 3 + 2, alpha: 1, color: color
        });
    }
}

function handleKeyDown(key) {
    if (gameState !== STATES.PLAYING) return;

    // Player 1 스킬 조작
    if (!p1.isLock && p1.hp > 0) {
        if (key === 'f' || key === 'F') { p1.changeAction('attack', true); p1.hitbox.active = true; }
        if (key === 'g' || key === 'G') {
            if (p1.mp >= 25) {
                p1.mp -= 25; p1.changeAction('skill1', true);
                setTimeout(() => { projectiles.push(new Projectile(p1.x + (p1.isFlip ? 0 : p1.width), p1.y + 70, p1.isFlip ? -12 : 12, p1, '#5dade2')); }, 200);
            }
        }
        if (key === 'h' || key === 'H') {
            if (p1.mp >= 40) { p1.mp -= 40; p1.changeAction('skill2', true); setTimeout(() => { checkHit(p1, p2, 20, true, 260); }, 300); }
        }
        if (key === 'v' || key === 'V') {
            if (p1.mp >= 100) { p1.mp = 0; p1.changeAction('ult', true); flashDuration = 20; flashColor = "rgba(241, 196, 15, 0.6)"; setTimeout(() => { checkHit(p1, p2, 38, true, 450); }, 400); }
        }
    }

    // Player 2 스킬 조작
    if (!p2.isLock && p2.hp > 0) {
        if (key === '4') { p2.changeAction('attack', true); p2.hitbox.active = true; }
        if (key === '5') {
            if (p2.mp >= 25) {
                p2.mp -= 25; p2.changeAction('skill1', true);
                setTimeout(() => { projectiles.push(new Projectile(p2.x + (p2.isFlip ? 0 : p2.width), p2.y + 70, p2.isFlip ? -12 : 12, p2, '#ec7063')); }, 200);
            }
        }
        if (key === '6') {
            if (p2.mp >= 40) { p2.mp -= 40; p2.changeAction('skill2', true); setTimeout(() => { checkHit(p2, p1, 20, true, 260); }, 300); }
        }
        if (key === '0') {
            if (p2.mp >= 100) { p2.mp = 0; p2.changeAction('ult', true); flashDuration = 20; flashColor = "rgba(155, 89, 182, 0.6)"; setTimeout(() => { checkHit(p2, p1, 38, true, 450); }, 400); }
        }
    }
}

function checkHit(attacker, defender, damage, isRadiusAttack = false, radiusRange = 200) {
    if (defender.hp <= 0) return;
    let hitSuccess = false;
    if (isRadiusAttack) {
        const dist = Math.abs((attacker.x + attacker.width/2) - (defender.x + defender.width/2));
        if (dist <= radiusRange) hitSuccess = true;
    } else {
        const hb = attacker.hitbox;
        if (hb.x < defender.x + defender.width && hb.x + hb.w > defender.x &&
            hb.y < defender.y + defender.height && hb.y + hb.h > defender.y) {
            hitSuccess = true;
        }
    }
    if (hitSuccess) defender.takeDamage(damage);
}

function updateMovement() {
    if (gameState !== STATES.PLAYING) return;

    // Player 1 이동
    if (!p1.isLock && p1.hp > 0) {
        let isMoving = false;
        let speed = keys['Shift'] ? p1.runSpeed : p1.speed;
        let act = keys['Shift'] ? 'run' : 'walk';

        if (keys['a'] || keys['A']) { p1.x -= speed; p1.isFlip = true; isMoving = true; p1.changeAction(act); }
        else if (keys['d'] || keys['D']) { p1.x += speed; p1.isFlip = false; isMoving = true; p1.changeAction(act); }
        if (keys['c'] || keys['C']) { p1.changeAction('block'); isMoving = true; }
        if (!isMoving) p1.changeAction('idle');
    }

    // Player 2 이동
    if (!p2.isLock && p2.hp > 0) {
        let isMoving = false;
        let speed = keys['ArrowUp'] ? p2.runSpeed : p2.speed;
        let act = keys['ArrowUp'] ? 'run' : 'walk';

        if (keys['ArrowLeft']) { p2.x -= speed; p2.isFlip = true; isMoving = true; p2.changeAction(act); }
        else if (keys['ArrowRight']) { p2.x += speed; p2.isFlip = false; isMoving = true; p2.changeAction(act); }
        if (keys['1']) { p2.changeAction('block'); isMoving = true; }
        if (!isMoving) p2.changeAction('idle');
    }

    [p1, p2].forEach(p => {
        if (p.x < 0) p.x = 0;
        if (p.x > canvas.width - p.width) p.x = canvas.width - p.width;
    });
}

function startRound() {
    p1 = new Player(1, 150, 360, p1Selected, false);
    p2 = new Player(2, 750, 360, p2Selected, true);
    projectiles = []; particles = [];
    gameState = STATES.PLAYING;
}

function resetWholeGame() {
    p1Wins = 0; p2Wins = 0; currentRound = 1;
    p1Selected = null; p2Selected = null;
    gameState = STATES.SELECT;
}

canvas.addEventListener('click', e => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;

    if (gameState === STATES.SELECT) {
        for (let i = 1; i <= 4; i++) {
            if (mx > 80 + (i-1)*100 && mx < 160 + (i-1)*100 && my > 260 && my < 340) p1Selected = i;
            if (mx > 580 + (i-1)*100 && mx < 660 + (i-1)*100 && my > 260 && my < 340) p2Selected = i;
        }
        if (p1Selected && p2Selected && mx > 440 && mx < 584 && my > 480 && my < 540) startRound();
    } else if (gameState === STATES.GAME_OVER) {
        if (mx > 430 && mx < 590 && my > 420 && my < 475) resetWholeGame();
    }
});

function gameLoop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (gameState === STATES.SELECT) {
        drawSelectScreen();
    } else {
        updateMovement();
        p1.update(); p2.update();

        projectiles = projectiles.filter(p => p.active);
        projectiles.forEach(p => { p.update(); p.draw(); });

        particles.forEach(p => {
            p.x += p.vx; p.y += p.vy; p.alpha -= 0.02;
            ctx.save(); ctx.globalAlpha = p.alpha; ctx.fillStyle = p.color;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2); ctx.fill(); ctx.restore();
        });
        particles = particles.filter(p => p.alpha > 0);

        p1.draw(); p2.draw();
        drawFightUI();

        if (gameState === STATES.PLAYING) {
            if (p1.hp <= 0 || p2.hp <= 0) {
                gameState = STATES.ROUND_END;
                setTimeout(() => {
                    if (p1.hp <= 0 && p2.hp <= 0) {} 
                    else if (p1.hp <= 0) p2Wins++;
                    else p1Wins++;

                    if (p1Wins >= 2 || p2Wins >= 2) gameState = STATES.GAME_OVER;
                    else { currentRound++; startRound(); }
                }, 1500);
            }
        }

        if (gameState === STATES.ROUND_END) {
            ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "#fff"; ctx.font = "bold 40px Arial"; ctx.textAlign = "center";
            ctx.fillText("ROUND END", canvas.width/2, canvas.height/2);
        }

        if (gameState === STATES.GAME_OVER) drawGameOverScreen();
        if (flashDuration > 0) { ctx.fillStyle = flashColor; ctx.fillRect(0, 0, canvas.width, canvas.height); flashDuration--; }
    }
    requestAnimationFrame(gameLoop);
}

function drawSelectScreen() {
    ctx.fillStyle = "#1e272e"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#fff"; ctx.font = "bold 34px Arial"; ctx.textAlign = "center";
    ctx.fillText("캐릭터 선택창 (3판 2선승제)", canvas.width/2, 100);

    ctx.textAlign = "left"; ctx.font = "22px Arial"; ctx.fillStyle = "#3498db"; ctx.fillText("Player 1 선택", 120, 210);
    for (let i = 1; i <= 4; i++) {
        ctx.fillStyle = p1Selected === i ? '#3498db' : '#57606f'; ctx.fillRect(80 + (i-1)*100, 260, 80, 80);
        ctx.fillStyle = '#fff'; ctx.font = "bold 20px Arial"; ctx.fillText(i, 112 + (i-1)*100, 308);
    }

    ctx.fillStyle = "#e74c3c"; ctx.fillText("Player 2 선택", 620, 210);
    for (let i = 1; i <= 4; i++) {
        ctx.fillStyle = p2Selected === i ? '#e74c3c' : '#57606f'; ctx.fillRect(580 + (i-1)*100, 260, 80, 80);
        ctx.fillStyle = '#fff'; ctx.fillText(i, 612 + (i-1)*100, 308);
    }

    if (p1Selected && p2Selected) {
        ctx.fillStyle = "#2ecc71"; ctx.fillRect(440, 480, 144, 60);
        ctx.fillStyle = "#fff"; ctx.textAlign = "center"; ctx.fillText("게임 시작", 512, 517);
    }
}

function drawFightUI() {
    ctx.fillStyle = "rgba(0,0,0,0.6)"; ctx.fillRect(0, 0, canvas.width, 65);
    ctx.fillStyle = "#fff"; ctx.font = "bold 24px Arial"; ctx.textAlign = "center";
    ctx.fillText(`ROUND ${currentRound}`, canvas.width/2, 30);

    ctx.fillStyle = "#f1c40f";
    ctx.fillText(`★`.repeat(p1Wins) + `☆`.repeat(2 - p1Wins), 200, 38);
    ctx.fillText(`★`.repeat(p2Wins) + `☆`.repeat(2 - p2Wins), 824, 38);

    ctx.fillStyle = "#ccc"; ctx.fillRect(0, canvas.height - 40, canvas.width, 40);
    ctx.fillStyle = "#000"; ctx.font = "12px Arial";
    ctx.fillText("P1: A/D(이동) | Shift(대시) | C(막기) | F(공격) | G(스킬1) | H(스킬2) | V(필살기)", canvas.width/4 + 20, canvas.height - 15);
    ctx.fillText("P2: ←/→(이동) | ↑(대시) | 1(막기) | 4(공격) | 5(스킬1) | 6(스킬2) | 0(필살기)", (canvas.width/4)*3 - 20, canvas.height - 15);
}

function drawGameOverScreen() {
    ctx.fillStyle = "rgba(0,0,0,0.85)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#f1c40f"; ctx.font = "bold 40px Arial"; ctx.textAlign = "center";
    ctx.fillText(`최종 승리: ${p1Wins >= 2 ? 'Player 1' : 'Player 2'}`, canvas.width/2, canvas.height/2 - 40);
    ctx.fillStyle = "#34495e"; ctx.fillRect(430, 420, 160, 55);
    ctx.fillStyle = "#fff"; ctx.font = "bold 18px Arial"; ctx.fillText("다시 하기", canvas.width/2, 453);
}

gameLoop();
</script>
</body>
</html>
