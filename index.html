<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>픽셀 격투 게임 - 최종본</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #222;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }
        #gameContainer {
            position: relative;
            width: 800px;
            height: 500px;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        canvas {
            background-color: #333;
            border: 4px solid #555;
            display: block;
        }
        /* UI 오버레이 스타일 */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 800px; height: 500px;
            background: rgba(20, 20, 20, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }
        .hidden { display: none !important; }
        h1 { font-size: 40px; margin-bottom: 20px; color: #ffcc00; text-shadow: 2px 2px #000; }
        .menu-btn {
            background: #555; color: #fff; border: 2px solid #fff;
            padding: 10px 20px; margin: 10px; font-size: 20px; cursor: pointer;
            width: 200px; text-align: center;
        }
        .menu-btn:hover { background: #ffcc00; color: #000; }
        
        /* 캐릭터 선택 창 */
        .char-container { display: flex; gap: 15px; margin-bottom: 30px; }
        .char-box {
            width: 110px; height: 130px; background: #444; border: 3px solid #888;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer; font-weight: bold; font-size: 14px;
        }
        .char-box.selected-p1 { border-color: #ff4d4d; background: #622; }
        .char-box.selected-p2 { border-color: #4d4dff; background: #226; }
        .char-box.selected-both { border-color: #cc4dff; background: #424; }
        .char-thumb { width: 60px; height: 60px; background: #666; margin-bottom: 10px; border: 1px solid #777; }
    </style>
</head>
<body>

<div id="gameContainer">
    <div id="mainMenu" class="overlay">
        <h1>PIXEL FIGHTER</h1>
        <div class="menu-btn" onclick="selectMode(1)">1 PLAYER (vs AI)</div>
        <div class="menu-btn" onclick="selectMode(2)">2 PLAYERS</div>
    </div>

    <div id="charSelect" class="overlay hidden">
        <h1 id="selectTitle">PLAYER 1 선택하세요</h1>
        <div class="char-container">
            <div class="char-box" data-id="0" onclick="chooseCharacter(0)">
                <div class="char-thumb" style="background: url('1-1.jpg') no-repeat center/cover, #ff4d4d"></div>교복 남학생
            </div>
            <div class="char-box" data-id="1" onclick="chooseCharacter(1)">
                <div class="char-thumb" style="background: url('2-1.jpg') no-repeat center/cover, #4d4dff"></div>제복 장교
            </div>
            <div class="char-box" data-id="2" onclick="chooseCharacter(2)">
                <div class="char-thumb" style="background: url('3-1.jpg') no-repeat center/cover, #4dff4d"></div>그림자 소년
            </div>
            <div class="char-box" data-id="3" onclick="chooseCharacter(3)">
                <div class="char-thumb" style="background: url('4-1.jpg') no-repeat center/cover, #ffff4d"></div>교복 여학생
            </div>
        </div>
        <div id="controlInfo" style="text-align: center; color: #aaa; font-size: 14px; line-height: 1.5;"></div>
    </div>

    <canvas id="gameCanvas" width="800" height="500"></canvas>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// 게임 상태 관리
let gameState = "MENU"; 
let gameMode = 1;      
let p1SelectedChar = null;
let p2SelectedChar = null;
let selectingPlayer = 1;

// 캐릭터 데이터 정의 - 깃허브 이미지 및 프레임 맵 정보 통합
// ※ 깃허브 절대경로(https://raw.githubusercontent.com/...)로 완전히 바꾸셔도 됩니다.
const charactersData = [
    // --- 1번 캐릭터: 학생A (1-1.jpg) ---
    { 
        name: "학생A", color: "#ff4d4d", 
        // 로컬 경로 또는 깃허브 절대경로
        spriteSrc: "1-1.jpg",
        // 동작별 Y축(행) 번호 매핑 (0부터 시작)
        frameMap: { "IDLE": 0, "WALK": 1, "JUMP": 2, "GUARD": 3, "DASH": 4, "ATTACK": 5, "SKILL": 6, "HIT": 7 },
        // 동작별 실제 프레임 개수 정의
        framesPerAction: { "IDLE": 8, "WALK": 8, "JUMP": 8, "GUARD": 8, "DASH": 3, "ATTACK": 8, "SKILL": 8, "HIT": 8 }
    },
    // --- 2번 캐릭터: 장교 (2-1.jpg) ---
    { 
        name: "장교", color: "#4d4dff", 
        spriteSrc: "2-1.jpg",
        frameMap: { "IDLE": 0, "WALK": 1, "JUMP": 2, "GUARD": 3, "DASH": 4, "ATTACK": 5, "SKILL": 6, "HIT": 7 },
        framesPerAction: { "IDLE": 8, "WALK": 8, "JUMP": 8, "GUARD": 8, "DASH": 3, "ATTACK": 8, "SKILL": 8, "HIT": 8 }
    },
    // --- 3번 캐릭터: SHADOW (3-1.jpg) ---
    { 
        name: "SHADOW", color: "#4dff4d", 
        spriteSrc: "3-1.jpg",
        frameMap: { "IDLE": 0, "WALK": 1, "JUMP": 2, "GUARD": 3, "DASH": 4, "ATTACK": 5, "SKILL": 6, "HIT": 7 },
        // 3번 캐릭터는 모두 8프레임 루프
        framesPerAction: { "IDLE": 8, "WALK": 8, "JUMP": 8, "GUARD": 8, "DASH": 8, "ATTACK": 8, "SKILL": 8, "HIT": 8 }
    },
    // --- 4번 캐릭터: 학생F (4-1.jpg) ---
    { 
        name: "학생F", color: "#ffff4d", 
        spriteSrc: "4-1.jpg",
        frameMap: { "IDLE": 0, "WALK": 1, "JUMP": 2, "GUARD": 3, "DASH": 4, "ATTACK": 5, "SKILL": 6, "HIT": 7 },
        // 4번 캐릭터는 모두 8프레임 루프
        framesPerAction: { "IDLE": 8, "WALK": 8, "JUMP": 8, "GUARD": 8, "DASH": 8, "ATTACK": 8, "SKILL": 8, "HIT": 8 }
    }
];

// 조작키 매핑
const keys = {
    KeyA: false, KeyD: false, KeyW: false, KeyS: false, 
    KeyF: false, KeyG: false, KeyH: false,             
    ArrowLeft: false, ArrowRight: false, ArrowUp: false, ArrowDown: false,
    Numpad1: false, Numpad2: false, Numpad3: false
};

// 플레이어 클래스 - 스프라이트 자동 계산 로직 적용
class Fighter {
    constructor(x, y, color, isPlayer2, charData) {
        this.x = x;
        this.y = y;
        this.baseY = y;
        // 캐릭터 렌더링 크기 (픽셀 아트 비율에 맞춤)
        this.width = 90;   
        this.height = 130; 
        this.color = color;
        this.isP2 = isPlayer2;
        this.name = charData.name;

        // 스탯
        this.hp = 100; this.maxHp = 100;
        this.mp = 0; this.maxMp = 100;

        // 물리/이동 변수
        this.vx = 0; this.vy = 0;
        this.speed = 4;
        this.gravity = 0.6;
        this.isGrounded = true;

        // 상태 변수
        this.state = "IDLE";
        this.direction = isPlayer2 ? -1 : 1; 
        
        this.stateTimer = 0;
        this.dashCooldown = 0;

        // --- 스프라이트 시트 제어 ---
        this.spriteImage = new Image(); 
        if(charData.spriteSrc) this.spriteImage.src = charData.spriteSrc;
        
        // 데이터에서 프레임 정보 가져오기
        this.frameMap = charData.frameMap;
        this.framesPerAction = charData.framesPerAction;

        this.currentFrame = 0;
        this.frameCounter = 0;
        this.animSpeed = 8; // 애니메이션 속도 (낮을수록 빠름)
    }

    update(opponent) {
        // 기력 자연 회복
        if (this.mp < this.maxMp && this.state !== "SKILL") {
            this.mp = Math.min(this.maxMp, this.mp + 0.017 * 60); 
        }

        if (this.dashCooldown > 0) this.dashCooldown--;

        this.vy += this.gravity;
        this.y += this.vy;

        if (this.y >= this.baseY) {
            this.y = this.baseY;
            this.vy = 0;
            this.isGrounded = true;
        }

        if (this.stateTimer > 0) {
            this.stateTimer--;
            if (this.stateTimer === 0) {
                this.state = "IDLE";
            }
        }

        this.x += this.vx;
        this.vx *= 0.8;

        if (this.state === "IDLE" || this.state === "WALK" || this.state === "JUMP") {
            this.direction = (opponent.x > this.x) ? 1 : -1;
        }

        if (this.x < 0) this.x = 0;
        if (this.x > canvas.width - this.width) this.x = canvas.width - this.width;

        // --- 애니메이션 프레임 제어 ---
        let totalFrames = this.framesPerAction[this.state] || 8;
        
        // DASH 상태일 때만 프레임 속도 빠르게 조절 (대쉬 프레임 부족 예외 처리 포함)
        if(this.state === "DASH" && totalFrames < 8) {
             if(this.frameCounter % 4 === 0) {
                this.currentFrame = Math.min(totalFrames - 1, Math.floor((10 - this.stateTimer) / 3));
            }
        } else {
            // 다른 동작은 일반적인 속도로 루프
            this.frameCounter++;
            if(this.frameCounter % this.animSpeed === 0) {
                this.currentFrame = (this.currentFrame + 1) % totalFrames;
            }
        }
        
        // 상태가 바뀌면 프레임 초기화
        if(this.stateTimer > 0 && this.currentFrame >= totalFrames) {
             this.currentFrame = totalFrames - 1; 
        }
    }

    move(dir) {
        if (["IDLE", "WALK"].includes(this.state) && this.isGrounded) {
            this.x += dir * this.speed;
            this.state = "WALK";
        }
    }

    jump() {
        if (this.isGrounded && ["IDLE", "WALK"].includes(this.state)) {
            this.vy = -13;
            this.isGrounded = false;
            this.state = "JUMP";
        }
    }

    guard(isGuarding) {
        if (this.isGrounded && ["IDLE", "WALK", "GUARD"].includes(this.state)) {
            this.state = isGuarding ? "GUARD" : "IDLE";
        }
    }

    dash() {
        if (this.dashCooldown === 0 && ["IDLE", "WALK"].includes(this.state)) {
            this.state = "DASH";
            this.vx = this.direction * 15;
            this.stateTimer = 10; 
            this.dashCooldown = 45; 
        }
    }

    attack(opponent) {
        if (["IDLE", "WALK", "JUMP"].includes(this.state)) {
            this.state = "ATTACK";
            this.stateTimer = 15; 
            
            let hitRange = this.direction === 1 ? this.x + this.width : this.x - 60;
            if (this.checkCollision(hitRange, this.y, 60, this.height, opponent)) {
                opponent.takeDamage(5, "NORMAL");
            }
        }
    }

    useSkill(opponent) {
        if (this.mp >= 30 && ["IDLE", "WALK"].includes(this.state)) {
            this.mp -= 30;
            this.state = "SKILL";
            this.stateTimer = 30; 
            this.vx = this.direction * 5; 

            let hitRange = this.direction === 1 ? this.x + this.width : this.x - 140;
            if (this.checkCollision(hitRange, this.y, 140, this.height, opponent)) {
                opponent.takeDamage(15, "SKILL");
            }
        }
    }

    takeDamage(amount, type) {
        if (this.state === "GUARD" && type === "NORMAL") {
            this.hp -= amount * 0.1; 
            this.mp = Math.min(this.maxMp, this.mp + 5); 
        } else {
            this.hp -= amount;
            this.state = "HIT";
            this.stateTimer = 12;
            this.vx = this.direction * -5; 
        }
        if (this.hp < 0) this.hp = 0;
    }

    checkCollision(ax, ay, aw, ah, opponent) {
        return ax < opponent.x + opponent.width &&
               ax + aw > opponent.x &&
               ay < opponent.y + opponent.height &&
               ay + ah > opponent.y;
    }

    draw() {
        // 이미지가 로드되지 않았으면 임시 박스 그리기
        if (!this.spriteImage.complete || !this.frameMap || this.frameMap[this.state] === undefined) {
            this.drawTempBox();
            return;
        }

        // --- 스프라이트 좌표 계산 ---
        let frameYIndex = this.frameMap[this.state];
        let frameXIndex = this.currentFrame;
        
        // SkillAttack(R7) 프레임 부족 예외 처리
        if(this.state === "SKILL" && this.framesPerAction["SKILL"] < 8 && frameXIndex >= 6) {
             frameXIndex = 5;
        }

        let frameWidth = 256;  
        let frameHeight = 256; 

        let sx = frameXIndex * frameWidth;
        let sy = frameYIndex * frameHeight;

        ctx.save();
        // 캐릭터 반전 처리
        if (this.direction === -1) {
            ctx.translate(this.x + this.width, this.y);
            ctx.scale(-1, 1);
            ctx.drawImage(this.spriteImage, sx, sy, frameWidth, frameHeight, 0, 0, this.width, this.height);
        } else {
            ctx.translate(this.x, this.y);
            ctx.drawImage(this.spriteImage, sx, sy, frameWidth, frameHeight, 0, 0, this.width, this.height);
        }
        ctx.restore();

        // 이름 및 상태 텍스트
        ctx.fillStyle = "#fff"; ctx.font = "12px sans-serif";
        ctx.fillText(this.name, this.x + 10, this.y - 25);
        ctx.fillText(this.state, this.x + 10, this.y - 10);

        // 가드 이펙트
        if (this.state === "GUARD") {
            ctx.strokeStyle = "#00ffff"; ctx.lineWidth = 3;
            ctx.strokeRect(this.x, this.y, this.width, this.height);
        }
    }

    drawTempBox() {
        ctx.fillStyle = this.color;
        ctx.fillRect(this.x, this.y, this.width, this.height);
        ctx.fillStyle = "#fff"; ctx.font = "12px sans-serif";
        ctx.fillText("IMG LOADING...", this.x + 10, this.y + this.height/2);
    }
}

let player1;
let player2;

function selectMode(mode) {
    gameMode = mode;
    document.getElementById("mainMenu").classList.add("hidden");
    document.getElementById("charSelect").classList.remove("hidden");
    startCharSelect();
}

function startCharSelect() {
    selectingPlayer = 1;
    p1SelectedChar = null;
    p2SelectedChar = null;
    document.getElementById("selectTitle").innerText = "PLAYER 1 캐릭터를 선택하세요";
    document.getElementById("controlInfo").innerHTML = `[1P 조작키] A,D: 이동 | W: 점프 | S: 방어 <br> F: 일반공격 | G: 스킬(기력30) | H: 대쉬`;
    updateCharBoxes();
}

function chooseCharacter(id) {
    if (selectingPlayer === 1) {
        p1SelectedChar = id;
        if (gameMode === 2) {
            selectingPlayer = 2;
            document.getElementById("selectTitle").innerText = "PLAYER 2 캐릭터를 선택하세요";
            document.getElementById("controlInfo").innerHTML = `[2P 조작키] 방향키 ←,→: 이동 | ↑: 점프 | ↓: 방어 <br> 패드1: 일반공격 | 패드2: 스킬(기력30) | 패드3: 대쉬`;
            updateCharBoxes();
        } else {
            p2SelectedChar = Math.floor(Math.random() * 4); 
            startGame();
        }
    } else if (selectingPlayer === 2) {
        p2SelectedChar = id;
        startGame();
    }
}

function updateCharBoxes() {
    const boxes = document.querySelectorAll(".char-box");
    boxes.forEach((box, idx) => {
        box.className = "char-box";
        if (idx === p1SelectedChar && idx === p2SelectedChar) box.classList.add("selected-both");
        else if (idx === p1SelectedChar) box.classList.add("selected-p1");
        else if (idx === p2SelectedChar) box.classList.add("selected-p2");
    });
}

function startGame() {
    document.getElementById("charSelect").classList.add("hidden");
    
    player1 = new Fighter(150, 270, charactersData[p1SelectedChar].color, false, charactersData[p1SelectedChar]);
    player2 = new Fighter(580, 270, charactersData[p2SelectedChar].color, true, charactersData[p2SelectedChar]);

    gameState = "PLAYING";
    requestAnimationFrame(gameLoop);
}

// 키이벤트 핸들러
window.addEventListener("keydown", (e) => {
    if (e.code in keys) keys[e.code] = true;
    
    if (gameState === "PLAYING") {
        if (e.code === "KeyW") player1.jump();
        if (e.code === "KeyF") player1.attack(player2);
        if (e.code === "KeyG") player1.useSkill(player2);
        if (e.code === "KeyH") player1.dash();

        if (gameMode === 2) {
            if (e.code === "ArrowUp") player2.jump();
            if (e.code === "Numpad1") player2.attack(player1);
            if (e.code === "Numpad2") player2.useSkill(player1);
            if (e.code === "Numpad3") player2.dash();
        }
    }
    
    if (gameState === "GAME_OVER" && e.code === "Escape") {
        document.getElementById("mainMenu").classList.remove("hidden");
        gameState = "MENU";
    }
});

window.addEventListener("keyup", (e) => {
    if (e.code in keys) keys[e.code] = false;
});

function runAI() {
    if (player2.state === "HIT") return;
    let distance = Math.abs(player1.x - player2.x);

    if (player1.state === "ATTACK" && distance < 100 && Math.random() < 0.4) {
        player2.guard(true);
        return;
    } else {
        player2.guard(false);
    }

    if (distance > 130) {
        player2.move(player2.direction);
        if(Math.random() < 0.02) player2.dash();
    } else {
        if (Math.random() < 0.05) {
            player2.attack(player1);
        } else if (player2.mp >= 30 && Math.random() < 0.03) {
            player2.useSkill(player1);
        }
    }
}

function drawUI() {
    ctx.fillStyle = "#555"; ctx.fillRect(30, 25, 300, 20);
    ctx.fillStyle = "#ff4d4d"; ctx.fillRect(30, 25, 300 * (player1.hp / player1.maxHp), 20);
    ctx.fillStyle = "#555"; ctx.fillRect(30, 50, 200, 10);
    ctx.fillStyle = "#33ccff"; ctx.fillRect(30, 50, 200 * (player1.mp / player1.maxMp), 10);
    
    ctx.fillStyle = "#555"; ctx.fillRect(470, 25, 300, 20);
    ctx.fillStyle = "#ff4d4d"; ctx.fillRect(470 + (300 - 300 * (player2.hp / player2.maxHp)), 25, 300 * (player2.hp / player2.maxHp), 20);
    ctx.fillStyle = "#555"; ctx.fillRect(570, 50, 200, 10);
    ctx.fillStyle = "#33ccff"; ctx.fillRect(570 + (200 - 200 * (player2.mp / player2.maxMp)), 50, 200 * (player2.mp / player2.maxMp), 10);

    ctx.fillStyle = "#fff"; ctx.font = "bold 16px sans-serif";
    ctx.fillText(player1.name, 30, 18);
    ctx.fillText(player2.name, 770 - ctx.measureText(player2.name).width, 18);
}

function gameLoop() {
    if (gameState !== "PLAYING") return;

    if (keys.KeyA) player1.move(-1);
    if (keys.KeyD) player1.move(1);
    player1.guard(keys.KeyS);

    if (gameMode === 2) {
        if (keys.ArrowLeft) player2.move(-1);
        if (keys.ArrowRight) player2.move(1);
        player2.guard(keys.ArrowDown);
    } else {
        runAI();
    }

    player1.update(player2);
    player2.update(player1);

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    ctx.strokeStyle = "#666"; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.moveTo(0, 400); ctx.lineTo(canvas.width, 400); ctx.stroke();

    player1.draw();
    player2.draw();
    drawUI();

    if (player1.hp <= 0 || player2.hp <= 0) {
        gameState = "GAME_OVER";
        ctx.fillStyle = "rgba(0,0,0,0.7)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#ffcc00";
        ctx.font = "bold 40px sans-serif";
        
        let winText = player1.hp <= 0 ? `${player2.name} 승리!` : `${player1.name} 승리!`;
        ctx.fillText(winText, canvas.width/2 - ctx.measureText(winText).width/2, 220);
        
        ctx.fillStyle = "#fff";
        ctx.font = "20px sans-serif";
        ctx.fillText("메뉴로 돌아가려면 ESC를 누르세요", canvas.width/2 - 150, 280);
        return;
    }

    requestAnimationFrame(gameLoop);
}
</script>
</body>
</html>
